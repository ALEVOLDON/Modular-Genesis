  <path d="M542 520H658" stroke="url(#pipeC)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="600" cy="260" r="11" fill="#FFB347"/>
  <circle cx="307" cy="391" r="11" fill="#A68BFF"/>
  <circle cx="893" cy="391" r="11" fill="#66F7FF"/>
  <circle cx="600" cy="520" r="11" fill="#8EC5FF"/>
