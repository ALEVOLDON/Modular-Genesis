  <rect x="474" y="100" width="250" height="140" rx="26" fill="url(#panelB)" stroke="#26435A"/>
  <text x="508" y="144" fill="#FFB347" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">DAW CONTROL</text>
  <text x="508" y="184" fill="#EFF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Ableton Live</text>
  <text x="508" y="214" fill="#8FA8BD" font-family="Segoe UI, Arial, sans-serif" font-size="16">arps, drums, routing</text>

