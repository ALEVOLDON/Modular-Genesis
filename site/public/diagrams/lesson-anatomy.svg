<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#071018"/>
  <defs><linearGradient id="panelC" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f1d2b"/><stop offset="100%" stop-color="#091420"/></linearGradient></defs>
  <text x="72" y="72" fill="#EFF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700">Lesson Anatomy</text>
  <text x="72" y="108" fill="#8FA8BD" font-family="Segoe UI, Arial, sans-serif" font-size="18">Standard lesson structure for a scalable, predictable course experience.</text>
  <rect x="88" y="164" width="1024" height="510" rx="30" fill="url(#panelC)" stroke="#26435A"/>
  <rect x="124" y="206" width="400" height="78" rx="20" fill="#102131" stroke="#2A465D"/>
  <text x="150" y="253" fill="#66F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">1. Theory</text>
  <text x="600" y="253" fill="#8FA8BD" font-family="Segoe UI, Arial, sans-serif" font-size="18">Short explanation of the concept and module role.</text>
  <rect x="124" y="302" width="400" height="78" rx="20" fill="#102131" stroke="#2A465D"/>
  <text x="150" y="349" fill="#FFB347" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">2. Patch Diagram</text>
  <text x="600" y="349" fill="#8FA8BD" font-family="Segoe UI, Arial, sans-serif" font-size="18">Clear signal chain or routing sketch.</text>
  <rect x="124" y="398" width="400" height="78" rx="20" fill="#102131" stroke="#2A465D"/>
  <text x="150" y="445" fill="#A68BFF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">3. Patch File</text>
  <text x="600" y="445" fill="#8FA8BD" font-family="Segoe UI, Arial, sans-serif" font-size="18">Repository link to a .vcv patch entry or downloadable file.</text>
  <rect x="124" y="494" width="400" height="78" rx="20" fill="#102131" stroke="#2A465D"/>
  <text x="150" y="541" fill="#66F7FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">4. Practice Task</text>
  <text x="600" y="541" fill="#8FA8BD" font-family="Segoe UI, Arial, sans-serif" font-size="18">Concrete exercise: rebuild, vary, or extend the patch.</text>
  <path d="M524 245H572" stroke="#66F7FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M524 341H572" stroke="#FFB347" stroke-width="6" stroke-linecap="round"/>
